name: LaTeX CI

env:
  MAIN_TEX: cv.tex
  FILENAME: TiagoRocha-CV

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: XeLaTeX
    runs-on: ubuntu-latest
    container:
      image: seignovert/latex-cv

    steps:
      - uses: actions/checkout@v4

      # Run twice to resolve references (e.g., lastpage)
      - name: Build CV
        run: |
          xelatex -jobname=output ${MAIN_TEX}
          xelatex -jobname=output ${MAIN_TEX}

      - name: Save PDF
        uses: actions/upload-artifact@v4
        with:
          name: pdf
          path: output.pdf

  create_release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Retrieve PDF
        uses: actions/download-artifact@v4
        with:
          name: pdf
          path: .

      - name: Set up release metadata
        shell: bash
        run: |
          NEW_TAG=$(date +'%Y.%m.%d')
          LAST_TAG=$(git tag --sort=creatordate | grep -v "^${NEW_TAG}$" | tail -n 1 || true)

          if [ -n "$LAST_TAG" ]; then
            CHANGELOG=$(git log --pretty='format:- %s' "${LAST_TAG}..HEAD")
          else
            CHANGELOG=$(git log --pretty='format:- %s' HEAD)
          fi

          echo "RELEASE_TAG=$NEW_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NAME=$(date +'%Y/%m/%d') - Curriculum Vitae" >> "$GITHUB_ENV"

          echo "RELEASE_BODY<<EOF" >> "$GITHUB_ENV"
          echo "$CHANGELOG" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

          echo "RELEASE_PDF=$(date +'%Y')-${FILENAME}.pdf" >> "$GITHUB_ENV"

      - name: Rename PDF for release asset
        run: mv output.pdf "${RELEASE_PDF}"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          body: ${{ env.RELEASE_BODY }}
          files: ${{ env.RELEASE_PDF }}